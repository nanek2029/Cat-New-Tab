<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Favorites</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css?family=Alexandria" rel="stylesheet">
  </head>
  <body>
    <div class="popup">
      <div class="header">
        <div class="title">Favorite Wallpapers</div>
        <div class="subtitle">Pick one to set your current background.</div>
      </div>

      <div id="favorites-list" class="list"></div>
      <div id="empty-state" class="empty hidden">No favorites yet. Tap the heart on a wallpaper to save it.</div>
      <div id="status" class="status hidden"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
